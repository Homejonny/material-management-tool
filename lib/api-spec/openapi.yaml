openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: materials
    description: Material procurement operations
  - name: presence
    description: Real-time user presence
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /materials:
    get:
      operationId: getMaterials
      tags: [materials]
      summary: Get all materials with procurement overview
      responses:
        "200":
          description: List of materials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Material"
  /presence/heartbeat:
    post:
      operationId: presenceHeartbeat
      tags: [presence]
      summary: Send a heartbeat to register as active
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeartbeatRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeartbeatResponse"
  /presence/active:
    get:
      operationId: getActiveUsers
      tags: [presence]
      summary: Get list of currently active users
      responses:
        "200":
          description: Active users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActiveUser"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    HeartbeatRequest:
      type: object
      properties:
        clientId:
          type: string
          description: Unique client identifier (stored in localStorage)
        name:
          type: string
          description: Display name of the user
      required:
        - clientId
        - name
    HeartbeatResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
    ActiveUser:
      type: object
      properties:
        clientId:
          type: string
        name:
          type: string
        lastSeen:
          type: string
          format: date-time
        color:
          type: string
      required:
        - clientId
        - name
        - lastSeen
        - color
    Substitute:
      type: object
      properties:
        st:
          oneOf:
            - type: string
            - type: number
        opis:
          type: string
        zaloga:
          type: number
        cena:
          type: number
      required:
        - st
        - opis
        - zaloga
        - cena
    Material:
      type: object
      properties:
        st:
          oneOf:
            - type: string
            - type: number
        opis:
          type: string
        zaloga:
          type: number
        cena:
          type: number
        kolicina:
          type: number
        totalSubStock:
          type: number
        dejansko:
          type: number
        nadomestki:
          type: array
          items:
            $ref: "#/components/schemas/Substitute"
      required:
        - st
        - opis
        - zaloga
        - cena
        - kolicina
        - totalSubStock
        - dejansko
        - nadomestki
