openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: materials
    description: Material procurement operations
  - name: presence
    description: Real-time user presence
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /materials:
    get:
      operationId: getMaterials
      tags: [materials]
      summary: Get all materials with procurement overview
      responses:
        "200":
          description: List of materials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Material"
  /materials/refresh:
    post:
      operationId: refreshMaterials
      tags: [materials]
      summary: Force refresh of BC live data cache
      responses:
        "200":
          description: Refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  count:
                    type: number
                required:
                  - ok
                  - count
  /orders:
    get:
      operationId: getOrderSuggestions
      tags: [materials]
      summary: Get suggested order dates per material based on BC planning data
      responses:
        "200":
          description: List of order suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderSuggestion"
  /presence/heartbeat:
    post:
      operationId: presenceHeartbeat
      tags: [presence]
      summary: Send a heartbeat to register as active
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeartbeatRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeartbeatResponse"
  /presence/active:
    get:
      operationId: getActiveUsers
      tags: [presence]
      summary: Get list of currently active users
      responses:
        "200":
          description: Active users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActiveUser"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    HeartbeatRequest:
      type: object
      properties:
        clientId:
          type: string
          description: Unique client identifier (stored in localStorage)
        name:
          type: string
          description: Display name of the user
      required:
        - clientId
        - name
    HeartbeatResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
    ActiveUser:
      type: object
      properties:
        clientId:
          type: string
        name:
          type: string
        lastSeen:
          type: string
          format: date-time
        color:
          type: string
      required:
        - clientId
        - name
        - lastSeen
        - color
    OrderSuggestion:
      type: object
      properties:
        st:
          type: string
        opis:
          type: string
        dejansko:
          type: number
        vendor_no:
          type: string
        vendor_name:
          type: string
        vendor_item_no:
          type: string
        lead_time:
          type: string
        lead_time_days:
          type: number
        order_date:
          type: string
        receipt_date:
          type: string
        replenishment_system:
          type: string
      required:
        - st
        - opis
        - dejansko
        - vendor_no
        - vendor_name
        - vendor_item_no
        - lead_time
        - lead_time_days
        - order_date
        - receipt_date
        - replenishment_system
    Substitute:
      type: object
      properties:
        st:
          oneOf:
            - type: string
            - type: number
        opis:
          type: string
        zaloga:
          type: number
        cena:
          type: number
      required:
        - st
        - opis
        - zaloga
        - cena
    Material:
      type: object
      properties:
        st:
          oneOf:
            - type: string
            - type: number
        opis:
          type: string
        zaloga:
          type: number
        cena:
          type: number
        kolicina:
          type: number
        totalSubStock:
          type: number
        dejansko:
          type: number
        nadomestki:
          type: array
          items:
            $ref: "#/components/schemas/Substitute"
      required:
        - st
        - opis
        - zaloga
        - cena
        - kolicina
        - totalSubStock
        - dejansko
        - nadomestki
